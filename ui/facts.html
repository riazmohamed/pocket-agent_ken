<!DOCTYPE html>
<html lang="en">
<head>
  <!-- gg-pixel: auto-wired by ggcoder pixel install -->
  <script src="gg-pixel.browser.iife.js"></script>
  <script>
    if (window.GGPixel) GGPixel.initPixel({ projectKey: "pk_live_f0f0b8e539537487522cdd7db1b14b25", ingestUrl: "https://gg-pixel-server.buzzbeamaustralia.workers.dev" });
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self'; img-src 'self' data:; connect-src 'self' https://gg-pixel-server.buzzbeamaustralia.workers.dev;">
  <title>My Brain</title>


  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <link rel="stylesheet" href="shared/variables.css">
  <link rel="stylesheet" href="shared/notyf-theme.css">
  <link rel="stylesheet" href="shared/base.css">
  <style>
    header {
      background: var(--bg-secondary);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Cal Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }

    header h1 span {
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .fact-count {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: 10px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    /* Header buttons inherit the cinamon-pill look from shared/buttons.css. */

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 32px;
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .facts-table {
      width: 100%;
      border-collapse: collapse;
    }

    .facts-table th,
    .facts-table td {
      padding: 12px 16px;
      text-align: left;
    }

    .facts-table th {
      background: var(--bg-secondary);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .facts-table td {
      font-size: 13px;
      vertical-align: top;
    }

    .facts-table tbody tr {
      transition: background 0.1s ease;
    }

    .facts-table tbody tr:hover {
      background: var(--bg-secondary);
    }

    .facts-table .category {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 500;
      white-space: nowrap;
      width: 100px;
    }

    .facts-table .subject {
      font-weight: 500;
      white-space: nowrap;
      width: 140px;
    }

    .facts-table .content-cell {
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .facts-table .actions {
      width: 50px;
      text-align: center;
    }

    /* .delete-btn visuals come from shared/icon-buttons.css. */

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state svg {
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 14px;
    }

    .empty-state .hint {
      font-size: 12px;
      margin-top: 8px;
      opacity: 0.7;
    }

    /* Toast - Premium glassmorphism design */
    /* Utility classes */
    .hidden { display: none !important; }
    .flex-row { display: flex; align-items: center; }

    body.animations-paused *,
    body.animations-paused *::before,
    body.animations-paused *::after {
      animation-play-state: paused !important;
      transition: none !important;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <script src="shared/theme-loader.js"></script>
  <script type="module">
    import autoAnimate from 'https://cdn.jsdelivr.net/npm/@formkit/auto-animate@0.9/+esm';
    window._autoAnimate = autoAnimate;
    window.dispatchEvent(new Event('autoAnimateReady'));
  </script>
</head>
<body>
  <header>
    <div class="flex-row">
      <h1><span>My Brain</span></h1>
      <span class="fact-count" id="fact-count"></span>
    </div>
    <div class="header-actions">
      <button onclick="playNormalClick(); window.close()">Done</button>
      <button onclick="playNormalClick(); loadFacts()">Refresh Memory</button>
    </div>
  </header>

  <div class="content" id="content">
    <!-- Table will be inserted here -->
  </div>

  <!-- Click Sound -->
  <audio id="normal-click-sound" preload="auto" src="../assets/normal-click.mp3"></audio>

  <script>
    // Click sound
    const normalClickSound = document.getElementById('normal-click-sound');
    function playNormalClick() {
      if (normalClickSound) {
        normalClickSound.currentTime = 0;
        normalClickSound.play().catch(() => {});
      }
    }
    document.addEventListener('click', (e) => {
      if (e.target.closest('button, .toggle, .tab, select, .fact-row')) {
        playNormalClick();
      }
    });

    async function loadFacts() {
      try {
        const facts = await window.pocketAgent.facts.list();
        const content = document.getElementById('content');
        const countEl = document.getElementById('fact-count');

        countEl.textContent = `(${facts.length})`;

        if (facts.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7h8m-8 4h4m1 10.5V21c0-2.828 0-4.243.879-5.121C14.757 15 16.172 15 19 15h.5m.5-1.657V10c0-3.771 0-5.657-1.172-6.828S15.771 2 12 2S6.343 2 5.172 3.172S4 6.229 4 10v4.544c0 3.245 0 4.868.886 5.967a4 4 0 0 0 .603.603C6.59 22 8.211 22 11.456 22c.705 0 1.058 0 1.381-.114q.1-.036.197-.082c.31-.148.559-.397 1.058-.896l4.736-4.736c.579-.578.867-.867 1.02-1.235c.152-.368.152-.776.152-1.594"/></svg>
              <p>Your memory is empty</p>
              <p class="hint">Tell me things about yourself and I'll remember them</p>
            </div>
          `;
          return;
        }

        // Sort facts by category then subject
        facts.sort((a, b) => a.category.localeCompare(b.category) || a.subject.localeCompare(b.subject));

        content.innerHTML = `
          <table class="facts-table">
            <thead>
              <tr>
                <th>Category</th>
                <th>Subject</th>
                <th>Content</th>
                <th class="actions"></th>
              </tr>
            </thead>
            <tbody>
              ${facts.map(f => `
                <tr data-id="${f.id}">
                  <td class="category">${escapeHtml(f.category)}</td>
                  <td class="subject">${escapeHtml(f.subject)}</td>
                  <td class="content-cell">${escapeHtml(f.content)}</td>
                  <td class="actions">
                    <button class="delete-btn" onclick="playNormalClick(); deleteFact(${f.id})" title="Forget this">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.5" d="m19.5 5.5l-.62 10.025c-.158 2.561-.237 3.842-.88 4.763a4 4 0 0 1-1.2 1.128c-.957.584-2.24.584-4.806.584c-2.57 0-3.855 0-4.814-.585a4 4 0 0 1-1.2-1.13c-.642-.922-.72-2.205-.874-4.77L4.5 5.5M3 5.5h18m-4.944 0l-.683-1.408c-.453-.936-.68-1.403-1.071-1.695a2 2 0 0 0-.275-.172C13.594 2 13.074 2 12.035 2c-1.066 0-1.599 0-2.04.234a2 2 0 0 0-.278.18c-.395.303-.616.788-1.058 1.757L8.053 5.5"/></svg>
                    </button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (error) {
        console.error('Error loading facts:', error);
        showToast('Couldn\'t load memories', 'error');
      }
    }

    async function deleteFact(id) {
      if (!confirm('Forget this? 🤔')) return;

      try {
        const result = await window.pocketAgent.facts.delete(id);
        if (result.success) {
          const row = document.querySelector(`tr[data-id="${id}"]`);
          if (row) {
            row.remove();

            const countEl = document.getElementById('fact-count');
            const match = countEl.textContent.match(/\d+/);
            const currentCount = match ? parseInt(match[0]) : 0;
            countEl.textContent = `(${currentCount - 1})`;

            if (currentCount - 1 === 0) {
              loadFacts();
            }
          }
          showToast('Poof! Forgotten.', 'success');
        } else {
          showToast('Couldn\'t forget that', 'error');
        }
      } catch (error) {
        console.error('Error deleting fact:', error);
        showToast('Couldn\'t forget that', 'error');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    const notyf = new Notyf({
      duration: 3000, position: { x: 'right', y: 'bottom' },
      dismissible: true,
      types: [
        { type: 'success', background: '#4ade80' },
        { type: 'error', background: '#f87171' }
      ]
    });
    function showToast(message, type = 'success') {
      notyf[type === 'error' ? 'error' : 'success'](message);
    }

    // Initialize
    loadFacts();

    window.addEventListener('autoAnimateReady', () => {
      const tbody = document.querySelector('tbody');
      if (tbody && window._autoAnimate) window._autoAnimate(tbody, { duration: 250 });
    });

    document.addEventListener('visibilitychange', () => {
      document.body.classList.toggle('animations-paused', document.hidden);
    });
    window.addEventListener('blur', () => document.body.classList.add('animations-paused'));
    window.addEventListener('focus', () => document.body.classList.remove('animations-paused'));
  </script>
</body>
</html>
